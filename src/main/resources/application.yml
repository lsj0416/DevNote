spring:
  profiles:
    active: local           # 기본 활성 프로파일 -> application-local.yml 로드

  application:
    name: devnote

  # JPA 공통 설정
  jpa:
    hibernate:
      ddl-auto: validate    # 운영: validate (테이블 자동 변경 x, 불일치 시 에러)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true    # SQL 로그를 보기 좋게 포맷팅
    open-in-view: false     # OSIV 비활성화

  # GitHub OAuth2
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}        # 환경변수에서 주입
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email
              - repo                              # private repo 접근용

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# 로깅
logging:
  level:
    com.devnote: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE  # 쿼리 파라미터 값 출력
